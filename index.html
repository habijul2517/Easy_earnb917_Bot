<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mining Reward System</title>

<script src="https://adexora.com/cdn/ads.js?id=467"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
background:#1e293b;
padding:25px;
border-radius:10px;
}

h1{
color:#38bdf8;
}

button{
width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
margin-top:15px;
}

button:disabled{
background:gray;
}

.progress{
margin-top:20px;
font-size:18px;
}

.timer{
font-size:30px;
margin-top:15px;
color:#facc15;
}

.code{
background:black;
padding:15px;
border-radius:10px;
font-size:22px;
margin-top:20px;
color:#22c55e;
}

</style>
</head>

<body>

<div class="container">

<h1>🚀 Mining Ads Reward</h1>

<p>Watch 10 Ads To Unlock Reward</p>

<div class="progress">
Ads Watched: <span id="count">0</span>/10
</div>

<div class="timer" id="timer">
Ready
</div>

<button id="watchBtn" onclick="watchAd()">Watch Ad</button>

<div id="reward"></div>

</div>

<script>

let adCount = 0;
let timer = 0;
let interval;

function watchAd(){

if(adCount >= 10){
return;
}

let watchTime = 18;

if(adCount == 8){
watchTime = 40;
}

timer = watchTime;

document.getElementById("watchBtn").disabled = true;

interval = setInterval(()=>{

document.getElementById("timer").innerText = "Wait: " + timer + "s";

timer--;

if(timer < 0){

clearInterval(interval);

showAd();

}

},1000);

}

function showAd(){

window.showAdexora()
.then(()=>{

adCount++;

document.getElementById("count").innerText = adCount;

document.getElementById("watchBtn").disabled = false;

document.getElementById("timer").innerText = "Ad Completed";

if(adCount == 10){

document.getElementById("reward").innerHTML =
'<div class="code">Reward Code: Habijul12#</div>';

document.getElementById("watchBtn").style.display="none";

}

})
.catch(()=>{

document.getElementById("timer").innerText="Ad Failed";

document.getElementById("watchBtn").disabled=false;

});

}

</script>

</body>
</html>
